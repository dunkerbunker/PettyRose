<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f0" />
    <title>Petty Rose Agreement Generator</title>
    <style>
      :root {
        background: #f5f5f0;
        color: #0b0b0b;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
      }

      .boot-loader {
        align-items: center;
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.035), transparent 260px),
          repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.018) 0 1px, transparent 1px 64px),
          #f5f5f0;
        display: grid;
        inset: 0;
        min-height: 100vh;
        place-items: center;
        position: fixed;
      }

      .boot-loader__card {
        align-items: center;
        display: grid;
        gap: 14px;
        justify-items: center;
      }

      .boot-loader__mark {
        align-items: center;
        aspect-ratio: 1;
        background: #0b0b0b;
        border-radius: 18px;
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.18);
        color: white;
        display: grid;
        font-size: 14px;
        font-weight: 900;
        place-items: center;
        width: 54px;
      }

      .boot-loader__bar {
        background: rgba(0, 0, 0, 0.1);
        border-radius: 999px;
        height: 4px;
        overflow: hidden;
        width: 132px;
      }

      .boot-loader__bar::after {
        animation: boot-load 900ms cubic-bezier(0.23, 1, 0.32, 1) infinite;
        background: #0b0b0b;
        border-radius: inherit;
        content: "";
        display: block;
        height: 100%;
        width: 45%;
      }

      .boot-loader__card span {
        color: #73736d;
        font-size: 12px;
        font-weight: 850;
        text-transform: uppercase;
      }

      @keyframes boot-load {
        from {
          transform: translateX(-115%);
        }
        to {
          transform: translateX(235%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-loader__bar::after {
          animation-duration: 1ms;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-loader" aria-live="polite" aria-label="Loading agreement generator">
        <div class="boot-loader__card">
          <div class="boot-loader__mark">PR</div>
          <div class="boot-loader__bar"></div>
          <span>Loading agreement tool</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
