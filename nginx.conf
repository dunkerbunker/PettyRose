server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types
    application/javascript
    application/json
    image/svg+xml
    text/css
    text/plain;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /pettyrose {
    return 301 /pettyrose/;
  }

  location /pettyrose/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /pettyrose/index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
